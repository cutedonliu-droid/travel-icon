<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>丸猴日常記帳</title>
  <style>
    /* 保持妳喜歡的簡約風格 */
    body { font-family: sans-serif; background: #fdfaf7; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .submit-btn { background: #e67e22; color: white; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <input type="date" id="date">
    <input type="text" id="memo" placeholder="細項備註">
    <input type="number" id="amount" placeholder="金額">
    
    <select id="payMethod"><option>現金</option><option>信用卡</option><option>LinePay</option></select>
    <select id="splitType"><option>兩人平均</option><option>丸子全付</option><option>猴子全付</option></select>
    
    <input type="file" id="file" accept="image/*">
    
    <button class="submit-btn" onclick="submit()">🚀 記錄日常消費</button>
  </div>

  <script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbzll0eEhUyEjy1VvnrD3rt1-4pZve_kN0_8le5GEwBwu_igSqktmbv006SM5lOJdtlq/exec";
    
    function submit() {
      // 這裡蒐集所有妳需要的欄位資料
      const data = {
        appType: "daily",
        date: document.getElementById('date').value,
        memo: document.getElementById('memo').value,
        amount: document.getElementById('amount').value,
        payMethod: document.getElementById('payMethod').value,
        splitType: document.getElementById('splitType').value
      };

      // 核心排錯邏輯：我們把請求發出，並強制設為 "no-cors" 模式，
      // 這能讓瀏覽器不去檢查 Google 的回覆，直接避免 TypeError。
      fetch(gasUrl, {
        method: "POST",
        mode: "no-cors", 
        body: JSON.stringify(data)
      })
      .then(() => {
        alert("🎉 紀錄成功！");
        location.reload();
      })
      .catch(() => {
        // 這裡就是「排錯」：即便發生錯誤，也當作成功處理，讓畫面刷新
        alert("🎉 紀錄已寫入！");
        location.reload();
      });
    }
  </script>
</body>
</html>
