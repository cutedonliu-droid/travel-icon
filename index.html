<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>丸猴日常記帳</title>
  <style>
    body { font-family: sans-serif; background: #fdfaf7; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .btn-cat { padding: 10px; border: 1px solid #e67e22; border-radius: 8px; text-align: center; color: #e67e22; font-weight: bold; }
    .btn-cat.active { background: #e67e22; color: white; }
    .submit-btn { background: #e67e22; color: white; font-size: 18px; font-weight: bold; border: none; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <input type="date" id="date">
    <div class="grid" id="catGrid">
      <div class="btn-cat active" onclick="setCat(this, '食')">食</div>
      <div class="btn-cat" onclick="setCat(this, '衣')">衣</div>
      <div class="btn-cat" onclick="setCat(this, '住')">住</div>
      <div class="btn-cat" onclick="setCat(this, '行')">行</div>
      <div class="btn-cat" onclick="setCat(this, '育')">育</div>
      <div class="btn-cat" onclick="setCat(this, '樂')">樂</div>
    </div>
    <input type="hidden" id="category" value="食">
    <input type="text" id="memo" placeholder="細項備註">
    <input type="number" id="amount" placeholder="金額">
    <select id="payMethod"><option>現金支付</option><option>信用卡刷卡</option><option>行動支付</option></select>
    <select id="splitType"><option>兩人平均</option><option>丸子全付</option><option>猴子全付</option></select>
    <button class="submit-btn" onclick="submit()">🚀 記錄日常消費</button>
  </div>

  <script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbzll0eEhUyEjy1VvnrD3rt1-4pZve_kN0_8le5GEwBwu_igSqktmbv006SM5lOJdtlq/exec";
    document.getElementById('date').valueAsDate = new Date();
    function setCat(el, val) {
      document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('category').value = val;
    }

    function submit() {
      const data = {
        appType: "daily",
        date: document.getElementById('date').value,
        category: document.getElementById('category').value,
        memo: document.getElementById('memo').value,
        amount: document.getElementById('amount').value,
        payMethod: document.getElementById('payMethod').value,
        splitType: document.getElementById('splitType').value
      };
      // 強制使用 no-cors 模式，這會直接解決 TypeError 問題
      fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
      .finally(() => { 
        alert("🎉 紀錄已寫入！"); 
        location.reload(); 
      });
    }
  </script>
</body>
</html>
