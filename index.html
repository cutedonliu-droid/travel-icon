<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>丸&猴旅遊分帳</title>
  <link rel="apple-touch-icon" href="https://images.weserv.nl/?url=raw.githubusercontent.com/cutedonliu-droid/travel-icon/main/icon.png&w=180&h=180&fit=cover&output=png">
  <style>
    :root { --primary: #4a90e2; --bg: #f5f7fa; --card: #ffffff; }
    body { font-family: sans-serif; background-color: var(--bg); padding: 15px; }
    .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 16px; margin-bottom: 10px; text-align: center; font-size: 14px; line-height: 1.6; }
    .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; }
    .submit-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="summary-card" id="summaryBox">📊 正在連接試算表...</div>
  <a id="sheetLink" href="#" target="_blank" style="display:block; text-align:center; margin-bottom:20px; color:#4a90e2; text-decoration:none; font-size:14px;">
    🔍 點此查看完整消費清單
  </a>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzll0eEhUyEjy1VvnrD3rt1-4pZve_kN0_8le5GEwBwu_igSqktmbv006SM5lOJdtlq/exec"; 
    const CURRENT_APP_TYPE = "travel"; 

    function updateSummary() {
      fetch(GAS_URL + "?type=" + CURRENT_APP_TYPE)
        .then(res => res.json())
        .then(data => {
          // 確保這裡正確解析換行
          document.getElementById('summaryBox').innerHTML = data.summary.replace(/\\n/g, '<br>');
          document.getElementById('sheetLink').href = data.url; 
        })
        .catch(err => {
          document.getElementById('summaryBox').innerText = "📊 連線錯誤，請稍後再試";
        });
    }

    // 修復這裡：正確的 onload
    window.onload = updateSummary;
  </script>
</body>
</html>
