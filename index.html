<div class="summary-card" id="summaryBox">📊 正在載入...</div>
<a id="sheetLink" href="#" target="_blank" style="display:block; text-align:center; margin-bottom:15px; color:#666; text-decoration:none; font-size:14px;">
  🔍 點此查看完整消費清單
</a>

<script>
  // 記得將這行改成您的 GAS 部署網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzll0eEhUyEjy1VvnrD3rt1-4pZve_kN0_8le5GEwBwu_igSqktmbv006SM5lOJdtlq/exec"; 
  const CURRENT_APP_TYPE = "travel"; 

  function updateSummary() {
    fetch(GAS_URL + "?type=" + CURRENT_APP_TYPE)
      .then(res => res.json())
      .then(data => {
        document.getElementById('summaryBox').innerHTML = data.summary.replace(/\\n/g, '<br>');
        document.getElementById('sheetLink').href = data.url; // 設定清單連結
      })
      .catch(err => {
        document.getElementById('summaryBox').innerText = "📊 無法連接試算表";
      });
  }
  window.onload = updateSummary;
</script>
